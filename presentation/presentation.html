<p>Artık şirketler sadece &quot;veri setini verin, model eğiteyim&quot; diyen profiller aramıyor.</p>
<p>Sadece sınıflandırma yapan bir notebook dosyası yeterli değil. Ham veriyi çeken, modeli eğiten, Dockerize eden ve bunu bir API olarak sunan <strong>uçtan uca (end-to-end)</strong> portföy projeleri geliştirin.</p>
</section>

<p>Bir ML mühendisi, aynı zamanda iyi bir yazılımcı olmalıdır.</p>
<ul>
<li>Python'da ustalaşın (OOP, dataclasses vs.).</li>
</ul>
<ul>
<li data-marpit-fragment="1">Git ve GitHub/GitLab kullanmayı bir refleks haline getirin.</li>

<li data-marpit-fragment="3">Döküman okumayı adet haline getirin.</li>
</ul>
